name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm --filter @harfai/shared lint || true
        # Note: full ESLint requires @harfai/eslint-config; stub until configured

      - name: Build shared
        run: pnpm --filter @harfai/shared build

      - name: Test shared
        run: pnpm --filter @harfai/shared test

      - name: Build CLI
        run: pnpm --filter @harfai/cli build

      - name: Test CLI
        run: pnpm --filter @harfai/cli test

      - name: Test backend
        run: pnpm --filter @harfai/backend test

      - name: Validate OpenAPI spec
        run: pnpm openapi:validate

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @harfai/e2e run install:browsers

      - name: Build backend
        run: pnpm --filter @harfai/backend build

      - name: Start backend
        run: |
          cd packages/backend && node dist/index.js &
          sleep 2
        env:
          NODE_ENV: test
          PORT: 3000

      - name: Run E2E tests (API only)
        run: pnpm --filter @harfai/e2e run test --project=chromium
        env:
          API_URL: http://localhost:3000
          BASE_URL: http://localhost:3000
