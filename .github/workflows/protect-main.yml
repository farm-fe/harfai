name: Apply Branch Protection

# Run automatically when this file is merged to main so the rules are always
# up-to-date, and allow manual re-runs by any admin.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/protect-main.yml'
  workflow_dispatch:

# Requires administration:write to manage branch protection rules.
# The built-in GITHUB_TOKEN has this permission when the workflow runs in
# context of a repo admin.  For forks or restricted environments, set a
# repository secret named ADMIN_TOKEN with a PAT that has the "repo" scope.
permissions:
  contents: read
  administration: write

jobs:
  protect:
    name: Enforce main branch rules
    runs-on: ubuntu-latest
    steps:
      - name: Apply branch protection to main
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN || github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Applying branch protection rules to main..."

          # Build the JSON payload.
          # Key settings:
          #   required_status_checks  → both CI jobs must pass before merge
          #   required_linear_history → disables regular merge commits (forces squash/rebase)
          #   enforce_admins          → admins are NOT exempt from these rules
          #   allow_force_pushes      → disabled to protect commit history
          #   allow_deletions         → disabled
          PAYLOAD=$(cat <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Lint, Build & Test",
                "E2E Tests"
              ]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": null,
            "restrictions": null,
            "required_linear_history": true,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true
          }
          JSON
          )

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/branches/main/protection" \
            -d "${PAYLOAD}")

          echo "HTTP status: ${HTTP_STATUS}"
          cat /tmp/response.json | python3 -m json.tool || cat /tmp/response.json

          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "✅ Branch protection applied successfully."
          else
            echo "❌ Failed to apply branch protection (HTTP ${HTTP_STATUS})."
            echo "   Ensure the token has 'administration:write' permission on this repo."
            exit 1
          fi
